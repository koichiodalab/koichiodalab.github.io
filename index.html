<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="en">

<title>Koichi Oda Final Lecture</title>

<style>
html,body{
margin:0;
height:100%;
background:#111111;
color:#EDEDED;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
padding:40px;
max-width:1200px;
}

.name{
font-size:88px;
font-weight:600;
letter-spacing:10px;

opacity:0;
transform:translateY(30px);
animation:fadeUp 1.5s forwards;
animation-delay:.5s;
}

.lecture{
margin-top:22px;

font-size:38px;
font-weight:300;
letter-spacing:6px;

opacity:0;
transform:translateY(30px);
animation:fadeUp 1.5s forwards;
animation-delay:2.2s;
}

.date{
margin-top:90px;

font-family:
"SF Pro Display",
-apple-system,
BlinkMacSystemFont,
sans-serif;

font-size:120px;
font-weight:600;
letter-spacing:4px;

opacity:0;
transform:scale(.93);
animation:dateReveal 1.8s forwards;
animation-delay:4s;
}

.date span{
font-size:54px;
font-weight:300;
margin-left:18px;
vertical-align:middle;
}

.countdown{
margin-top:65px;

font-size:42px;
font-weight:300;
letter-spacing:2px;

color:#FFD60A;

opacity:0;
animation:fadeIn 1.5s forwards;
animation-delay:5.5s;
}

.announcement{
margin-top:28px;

font-size:18px;
font-weight:300;
letter-spacing:2px;

opacity:0;
animation:fadeIn 1.5s forwards;
animation-delay:6.4s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn{
to{
opacity:.45;
}
}

@keyframes dateReveal{
to{
opacity:1;
transform:scale(1);
}
}

@media(max-width:900px){

.name{
font-size:52px;
letter-spacing:4px;
}

.lecture{
font-size:24px;
}

.date{
font-size:56px;
margin-top:55px;
}

.date span{
display:block;
font-size:28px;
margin-top:8px;
margin-left:0;
}

.countdown{
font-size:28px;
margin-top:40px;
}

.announcement{
font-size:14px;
margin-top:24px;
}
}

</style>
</head>

<body>

<div class="container">

<div class="name notranslate" translate="no">
KOICHI ODA
</div>

<div class="lecture notranslate" translate="no">
FINAL LECTURE
</div>

<div class="date notranslate" translate="no">
2027.03.06<span>Sat</span>
</div>

<div class="countdown" id="countdown">
Loading...
</div>

<div class="announcement notranslate" translate="no">
Further details coming soon.
</div>

</div>

<script>

const target =
new Date("2027-03-06T00:00:00").getTime();

function updateCountdown(){

const now = new Date().getTime();

let diff = target-now;

if(diff<0){
diff=0;
}

let days = Math.ceil(
diff/(1000*60*60*24)
);

document.getElementById("countdown").innerHTML =
days + " Days to Go";

}

updateCountdown();

/* 1時間ごと更新 */
setInterval(updateCountdown,3600000);

</script>

</body>
</html>
