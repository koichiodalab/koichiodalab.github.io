<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Koichi Oda Final Lecture</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;　
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
max-width:1200px;
padding:40px;
}

.name{
font-size:88px;
font-weight:600;
letter-spacing:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.5s forwards;
animation-delay:.6s;
}

.lecture{
font-size:38px;
font-weight:300;
letter-spacing:6px;
margin-top:24px;

opacity:0;
transform:translateY(30px);
animation:fadeUp 1.5s forwards;
animation-delay:2.3s;
}

.date{
margin-top:90px;

font-size:120px;
font-weight:600;
letter-spacing:6px;

opacity:0;
transform:scale(.92);
animation:dateReveal 1.8s forwards;
animation-delay:4s;
}

.date span{
font-size:54px;
font-weight:300;
margin-left:18px;
vertical-align:middle;
}

.clock{
margin-top:70px;

display:flex;
justify-content:center;
gap:18px;

opacity:0;
animation:fadeIn 1.4s forwards;
animation-delay:5.5s;
}

.flipbox{
width:120px;
}

.flip{
background:#111;
border-radius:18px;
padding:28px 0;

font-size:56px;
font-weight:200;

box-shadow:
inset 0 1px 0 rgba(255,255,255,.08),
0 0 40px rgba(255,255,255,.03);

animation:pulse 1s infinite;
}

.label{
margin-top:12px;
font-size:11px;
letter-spacing:3px;
opacity:.5;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn{
to{
opacity:1;
}
}

@keyframes dateReveal{
to{
opacity:1;
transform:scale(1);
}
}

@keyframes pulse{
0%{transform:translateY(0);}
50%{transform:translateY(-2px);}
100%{transform:translateY(0);}
}

@media(max-width:900px){

.name{
font-size:52px;
letter-spacing:4px;
}

.lecture{
font-size:24px;
}

.date{
font-size:56px;
margin-top:55px;
}

.date span{
display:block;
font-size:30px;
margin-top:10px;
margin-left:0;
}

.clock{
flex-wrap:wrap;
gap:12px;
margin-top:50px;
}

.flipbox{
width:90px;
}

.flip{
font-size:38px;
padding:18px 0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="name">
KOICHI ODA
</div>

<div class="lecture">
FINAL LECTURE
</div>

<div class="date">
2027.03.06<span>Sat</span>
</div>

<div class="clock">

<div class="flipbox">
<div class="flip" id="days">000</div>
<div class="label">DAYS</div>
</div>

<div class="flipbox">
<div class="flip" id="hours">00</div>
<div class="label">HOURS</div>
</div>

<div class="flipbox">
<div class="flip" id="minutes">00</div>
<div class="label">MINUTES</div>
</div>

<div class="flipbox">
<div class="flip" id="seconds">00</div>
<div class="label">SECONDS</div>
</div>

</div>

</div>

<script>

const target =
new Date("2027-03-06T00:00:00").getTime();

function pad(n){
return String(n).padStart(2,"0");
}

function updateCountdown(){

const now = new Date().getTime();

let diff = target-now;

if(diff<0){diff=0;}

const days=
Math.floor(
diff/(1000*60*60*24)
);

const hours=
Math.floor(
(diff%(1000*60*60*24))/
(1000*60*60)
);

const minutes=
Math.floor(
(diff%(1000*60*60))/
(1000*60)
);

const seconds=
Math.floor(
(diff%(1000*60))/
1000
);

document.getElementById("days").innerText=days;
document.getElementById("hours").innerText=pad(hours);
document.getElementById("minutes").innerText=pad(minutes);
document.getElementById("seconds").innerText=pad(seconds);

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
